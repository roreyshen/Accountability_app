<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px;
    }
    .sep { border-top: 1px solid #181818; }

    input[type="text"],
    input[type="password"] {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      color: #fff;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #555; }
    input::placeholder { color: #444; }

    button.primary {
      background: #fff;
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    button.primary:hover { background: #ddd; }

    button.ghost {
      background: none;
      border: 1px solid #2a2a2a;
      color: #666;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    button.ghost:hover { border-color: #555; color: #fff; }

    .muted { color: #555; font-size: 12px; }
    .error { color: #d04040; font-size: 11px; padding: 0 10px 8px; min-height: 18px; }

    /* toggle */
    .toggle { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; }
    .toggle input { display: none; }
    .slider { position: absolute; inset: 0; background: #2a2a2a; border-radius: 18px; cursor: pointer; transition: background 0.2s; }
    .toggle input:checked + .slider { background: #fff; }
    .slider::before {
      content: ''; position: absolute;
      width: 12px; height: 12px; left: 3px; bottom: 3px;
      background: #666; border-radius: 50%; transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .slider::before { transform: translateX(16px); background: #000; }

    /* list */
    ul { list-style: none; max-height: 260px; overflow-y: auto; }
    ul::-webkit-scrollbar { width: 3px; }
    ul::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }
    li { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-bottom: 1px solid #0d0d0d; }
    li:last-child { border-bottom: none; }
    li .name { opacity: 0.65; }
    button.remove { background: none; border: none; color: #2e2e2e; cursor: pointer; font-size: 16px; padding-left: 8px; line-height: 1; flex-shrink: 0; }
    button.remove:not(:disabled):hover { color: #fff; }
    button.remove:disabled { cursor: default; }
    .empty { padding: 16px 10px; color: #333; text-align: center; }

    /* schedule times */
    #schedule-times { display: flex; align-items: center; gap: 8px; padding: 0 10px 10px; }
    select {
      background: #111; border: 1px solid #2a2a2a; color: #fff;
      padding: 5px 6px; border-radius: 4px; font-size: 12px; outline: none;
    }

    /* pause area */
    #pause-area button.pause-btn {
      width: 100%; padding: 10px;
      background: none; border: none; border-top: 1px solid #181818;
      color: #444; cursor: pointer; font-size: 12px;
    }
    #pause-area button.pause-btn:hover { color: #fff; }
    .pause-status {
      padding: 10px; text-align: center;
      color: #555; font-size: 12px;
      border-top: 1px solid #181818;
    }
    .pause-status button {
      background: none; border: none; color: #777; cursor: pointer;
      text-decoration: underline; font-size: 12px; margin-left: 6px;
    }
    .pause-status button:hover { color: #fff; }
  </style>
</head>
<body>

  <!-- Always: add a site -->
  <div class="row">
    <input id="input" type="text" placeholder="site.com" autocomplete="off" />
    <button class="primary" id="add-btn">Add</button>
  </div>

  <!-- State: no PIN set -->
  <div id="no-pin" class="sep">
    <div class="row">
      <input id="new-pin" type="password" placeholder="Set a PIN to lock settings" maxlength="32" />
      <button class="primary" id="set-pin-btn">Set</button>
    </div>
    <div id="set-pin-error" class="error"></div>
  </div>

  <!-- State: locked -->
  <div id="locked" class="sep" style="display:none">
    <div class="row" style="justify-content:space-between">
      <span class="muted">🔒 Settings locked</span>
    </div>
    <div class="row" style="padding-top:0">
      <input id="pin-input" type="password" placeholder="Enter PIN to unlock" />
      <button class="primary" id="unlock-btn">Unlock</button>
    </div>
    <div id="pin-error" class="error"></div>
  </div>

  <!-- State: unlocked -->
  <div id="unlocked" class="sep" style="display:none">
    <div class="row" style="justify-content:space-between">
      <span class="muted">✓ Unlocked</span>
      <button class="ghost" id="lock-btn">Lock</button>
    </div>
  </div>

  <!-- Schedule (unlocked only) -->
  <div id="schedule-section" class="sep" style="display:none">
    <div class="row" style="justify-content:space-between">
      <span class="muted" style="text-transform:uppercase;font-size:11px;letter-spacing:0.08em">Schedule</span>
      <label class="toggle">
        <input type="checkbox" id="schedule-enabled" />
        <span class="slider"></span>
      </label>
    </div>
    <div id="schedule-times">
      <select id="start-hour"></select>
      <span class="muted">to</span>
      <select id="end-hour"></select>
    </div>
  </div>

  <!-- Site list -->
  <ul id="list" class="sep"></ul>

  <!-- Pause / countdown -->
  <div id="pause-area"></div>

  <!-- Activity link -->
  <div style="border-top:1px solid #0d0d0d; padding:8px 10px; text-align:right">
    <a id="stats-link" href="#" target="_blank"
       style="color:#333; font-size:11px; text-decoration:none; letter-spacing:0.05em">
      view activity →
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
