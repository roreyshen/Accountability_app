<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .add-row {
      display: flex;
      gap: 6px;
      padding: 10px;
      border-bottom: 1px solid #1a1a1a;
    }

    input {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      color: #fff;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    input::placeholder { color: #444; }
    input:focus { border-color: #555; }

    button.add {
      background: #fff;
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    button.add:hover { background: #ddd; }

    ul {
      list-style: none;
      max-height: 340px;
      overflow-y: auto;
    }
    ul::-webkit-scrollbar { width: 4px; }
    ul::-webkit-scrollbar-track { background: #000; }
    ul::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-bottom: 1px solid #0f0f0f;
    }
    li:last-child { border-bottom: none; }

    li span { opacity: 0.75; }

    button.remove {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 0 0 8px;
      flex-shrink: 0;
    }
    button.remove:hover { color: #fff; }

    .empty {
      padding: 24px 10px;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="add-row">
    <input id="input" type="text" placeholder="site.com" autocomplete="off" />
    <button class="add" id="add-btn">Add</button>
  </div>
  <ul id="list"></ul>
  <script src="popup.js"></script>
</body>
</html>
