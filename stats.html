<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stay Focused · Activity</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 64px 24px;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      color: #444;
      margin-bottom: 56px;
      letter-spacing: 0.05em;
      text-transform: lowercase;
    }

    section { margin-bottom: 52px; }

    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #333;
      margin-bottom: 16px;
    }

    /* Today's blocks */
    .site-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 9px 0;
      border-bottom: 1px solid #111;
    }
    .site-row:first-of-type { border-top: 1px solid #111; }
    .site-name { color: #999; font-size: 14px; }
    .site-count { color: #fff; font-size: 14px; font-variant-numeric: tabular-nums; font-weight: 500; }
    .total-row .site-name { color: #333; font-size: 12px; }
    .total-row .site-count { color: #555; font-size: 12px; }

    /* 7-day chart */
    .day-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 5px 0;
    }
    .day-label {
      width: 52px;
      color: #333;
      font-size: 12px;
      text-align: right;
      flex-shrink: 0;
    }
    .bar-wrap { flex: 1; }
    .bar { height: 5px; background: #fff; border-radius: 3px; }
    .bar.empty { background: #181818; width: 100%; }
    .day-count {
      width: 28px;
      color: #444;
      font-size: 12px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    /* Pauses */
    .pause-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 9px 0;
      border-bottom: 1px solid #111;
    }
    .pause-row:first-of-type { border-top: 1px solid #111; }
    .pause-time { color: #666; font-size: 13px; }
    .pause-duration { color: #444; font-size: 13px; font-variant-numeric: tabular-nums; }

    .empty { color: #2a2a2a; font-size: 13px; padding: 12px 0; }
  </style>
</head>
<body>
  <div class="page">
    <h1>stay focused · activity</h1>
    <div id="root"></div>
  </div>
  <script src="stats.js"></script>
</body>
</html>
